name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `vault-intelligence index`
        2. ...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: obsidian-intelligence version
      placeholder: "1.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Vault source
      options:
        - Filesystem
        - CouchDB (LiveSync)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I have removed any private vault content from logs and reproduction steps.
          required: true
